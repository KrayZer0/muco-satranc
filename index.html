<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Müco Satranç - Yapay Zeka</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #262522;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { margin-bottom: 10px; color: #f0d9b5; }
        #board { width: 400px; margin: 20px auto; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        #status { font-size: 1.2rem; font-weight: bold; margin-top: 10px; min-height: 30px; color: #b5996f; }
        .btn {
            background-color: #b5996f;
            color: #262522;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .btn:hover { background-color: #f0d9b5; }
    </style>
</head>
<body>

    <h1>Müco Satranç vs Stockfish</h1>
    <div id="board"></div>
    <div id="status">Senin sıran (Beyazlar)</div>
    <button class="btn" onclick="yeniOyun()">Oyunu Sıfırla</button>

    <script>
        var board = null;
        // Render'dan aldığın güncel canlı backend linki
        const BACKEND_URL = "https://satranc-backendd.onrender.com";

        function onDragStart (source, piece, position, orientation) {
            if (piece.search(/^b/) !== -1) return false;
        }

        async function onDrop (source, target, piece, newPos, oldPos, orientation) {
            if (source === target) return;

            document.getElementById('status').innerText = "Yapay zeka düşünüyor...";

            try {
                const response = await fetch(`${BACKEND_URL}/hamle-yap`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ source: source, target: target })
                });

                const data = await response.json();

                if (data.durum === 'basarili') {
                    board.move(`${data.kaynak}-${data.hedef}`);
                    document.getElementById('status').innerText = "Senin sıran (Beyazlar)";
                } else if (data.durum === 'oyun_bitti') {
                    document.getElementById('status').innerText = "Oyun bitti! " + data.mesaj;
                } else {
                    document.getElementById('status').innerText = "Hata: " + data.mesaj;
                    return 'snapback';
                }
            } catch (error) {
                console.error("Bağlantı hatası:", error);
                document.getElementById('status').innerText = "Bağlantı hatası! Sunucu uyanıyor olabilir, tekrar dene.";
                return 'snapback';
            }
        }

        async function yeniOyun() {
            try {
                await fetch(`${BACKEND_URL}/sifirla`, { method: 'POST' });
                board.start();
                document.getElementById('status').innerText = "Oyun sıfırlandı. Senin sıran!";
            } catch (error) {
                console.error("Sıfırlama hatası:", error);
            }
        }

        var config = {
            draggable: true,
            position: 'start',
            onDragStart: onDragStart,
            onDrop: onDrop,
            pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
        };
        
        board = Chessboard('board', config);
    </script>
</body>
</html>
